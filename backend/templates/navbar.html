<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.navbar {
  overflow: hidden;
  background-color: #3a1a36;
  position: fixed;
  bottom: 0;
  width: 100%;
}

.navbar a {
  float: left;
  display: block;
  color: #d9a80c;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.navbar a:hover {
  background: #f1f1f1;
  color: black;
}

.navbar a.active {
  background-color: #333;
  color: #d9a80c;
}

.main {
  padding: 16px;
  margin-bottom: 30px;
}
</style>
</head>
<body>

<div style="padding: 10px; background-color: #f5f5f5; position: fixed; top: 0; width: 100%; z-index: 1000;">
  <button onclick="history.back()" style="padding: 8px 16px; font-size: 16px; cursor: pointer;">← Back</button>
</div>

<div class="main" style="margin-top: 60px;">

    </div>


<div class="navbar">
    <a href="/" class="active">Home</a>
    <a href="/tasks">Task List</a>=
    <a href="/tasks/completed/">Completed Tasks</a>
    <a href="/tasks/create/">New Task</a>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const links = document.querySelectorAll(".navbar a");

    links.forEach(link => {
      link.addEventListener("click", function () {
        // Remove 'active' class from all links
        links.forEach(l => l.classList.remove("active"));

        // Add 'active' class to the clicked link
        this.classList.add("active");
      });
    });
  });
</script>

</body>
</html>
