<!DOCTYPE html>
<html lang="en">
{% extends 'base.html' %}
{% block content %}
<h2>Edit Task: {{ task.name }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" name="action" value="save">Save Changes</button>
    <button type="submit" name="action" value="mark_completed">Mark Task as Completed</button>
</form>


    <hr>

<h3>Edit Subtasks</h3>

{% if task.subtasks.exists %}
    <ul>
        {% for subtask in task.subtasks.all %}
            <li>
                {{ subtask.name }}
                <a href="{% url 'tasks:subtask-edit' subtask.id %}">
                    <button type="button">Edit Subtask</button>
                </a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No subtasks to edit.</p>
{% endif %}
{% endblock %}
</html>
