{% extends 'base.html' %}
{% block content %}
<h1>Create a New Task</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" name="action" value="save">Save Task</button>
    <button type="submit" name="action" value="add_subtasks">Save and Add Subtasks</button>
</form>

<script>
    // Set timezone cookie
    document.cookie = "timezone=" + Intl.DateTimeFormat().resolvedOptions().timeZone + ";path=/";
</script>
{% endblock %}
