<!DOCTYPE html>
<html lang="en">
{% extends 'base.html' %}
{% block content %}
<h2>Edit Subtask: {{ subtask.name }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" name="action" value="save">Save Changes</button>
    <button type="submit" name="action" value="mark_completed">Mark SubTask as Completed</button>
</form>

{% endblock %}
</html>
